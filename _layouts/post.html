---
layout: default
---
<div class="post-container">
    <div class="post-hero">
        <h1 class="post-hero-title">{{ page.title }}</h1>
        <time class="post-hero-date" datetime="{{ page.date | date_to_xmlschema }}">
            {{ page.date | date_to_long_string }}
        </time>
    </div>
    <article class="post-content">
        {{ page.content }}
    </article>
</div>
